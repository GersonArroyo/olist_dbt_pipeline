version: 2

models:
  - name: int_orders_enriched
    description: "Intermediate fact table for deliveries with date transformations and calculations"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: order_status
        tests:
          - not_null
      - name: order_purchase_timestamp
        tests:
          - not_null
      - name: order_delivered_carrier_date
      - name: order_delivered_customer_date
      - name: order_estimated_delivery_date
      - name: days_to_deliver
        description: "Number of days from purchase to delivery"
      - name: is_on_time
        description: "Flag indicating if the order was delivered on time"
      - name: estimated_days_to_deliver
        description: "Estimated number of days to deliver based on purchase and estimated delivery dates"
      - name: days_to_carrier_delivery
        description: "Number of days from purchase to carrier delivery"