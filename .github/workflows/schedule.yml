name: Scheduled Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1-5"  # Segunda a sexta à meia-noite UTC

permissions:
  id-token: write
  contents: read

jobs:
  run-dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup DBT
        uses: ./.github/actions/setup-dbt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/52586954053/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-sa@exalted-bonus-488516-k0.iam.gserviceaccount.com"
      
      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          olist_dbt_pipeline:
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: exalted-bonus-488516-k0
                dataset: olist_prod
                location: us-central1
                threads: 4
            target: prod
          EOF
          
      - name: Run dbt build (prod)
        run: dbt build --target prod
