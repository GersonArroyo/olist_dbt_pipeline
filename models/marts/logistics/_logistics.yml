version: 2

models:
  - name: fct_deliveries
    description: "Fact table for deliveries"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: order_status
        tests:
          - not_null
      - name: order_purchase_timestamp
        tests:
          - not_null
      - name: order_delivered_carrier_date
      - name: order_delivered_customer_date
      - name: order_estimated_delivery_date
        tests:
          - not_null
      - name: days_to_deliver
      - name: is_on_time
      - name: estimated_days_to_deliver
        tests:
          - not_null
      - name: days_to_carrier_delivery
        